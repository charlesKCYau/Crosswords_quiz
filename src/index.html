<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary Crossword Player</title>

  <!--
    SheetJS / xlsx library
    ---------------------------------------------------------------------------
    Purpose:
    - This external library lets the browser read .xlsx Excel files directly.
    - The app uses it to load vocabulary_crossword_puzzles_20tabs.xlsx.
    - XLSX.read(...) converts the Excel binary file into a JavaScript workbook.
  -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    /*
      ===========================================================================
      CSS DESIGN OVERVIEW
      ===========================================================================

      The page has two main panes:
      1. Puzzle pane: contains the crossword grid.
      2. Hint pane: contains Across and Down clues.

      Desktop layout:
      +---------------------------------------------------------------+
      | Header                                                        |
      +-----------------------------------------+---------------------+
      | Puzzle pane                             | Hints pane          |
      | wider                                   | narrower            |
      +-----------------------------------------+---------------------+

      Mobile layout:
      +-----------------------+
      | Header                |
      +-----------------------+
      | Puzzle pane           |
      +-----------------------+
      | Hints pane            |
      +-----------------------+

      Colour logic:
      - White cell: incomplete answer / normal state.
      - Yellow cell: completed vocabulary is correct.
      - Red cell: completed vocabulary is wrong.
      - Blue-ish cell: current focused cell.
    */

    :root {
      /* Base crossword square size on desktop. */
      --cell-size: 42px;

      /* Focused square becomes slightly larger so typing feels clearer. */
      --cell-size-active: 48px;

      --grid-gap: 2px;
      --border: #cfcfcf;
      --text: #222;
      --muted: #777;
      --correct: #ffe066;
      --wrong: #ff8a8a;
      --focus: #dbeafe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #fafafa;
    }

    /* Header contains title, worksheet selector, buttons and status text. */
    header {
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 20px;
      margin: 0 16px 0 0;
    }

    input[type="file"], select, button {
      font-size: 14px;
      padding: 8px 10px;
    }

    /*
      Main layout:
      - Puzzle pane gets flexible wide space.
      - Hint pane has fixed 360px width on desktop.
    */
    main {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 360px;
      gap: 18px;
      padding: 20px;
      align-items: start;
    }

    .pane {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    /* Allows large puzzles to scroll horizontally if needed. */
    .puzzle-pane {
      overflow: auto;
    }

    /*
      The crossword grid is generated dynamically by JavaScript.
      JavaScript sets grid-template-columns based on puzzle.cols.
    */
    .grid {
      display: inline-grid;
      gap: var(--grid-gap);
      background: transparent;
      padding: 4px;
    }

    /* Normal crossword cell. */
    .cell {
      position: relative;
      width: var(--cell-size);
      height: var(--cell-size);
      border: 1px solid var(--border);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: width 0.08s, height 0.08s, background 0.12s;
    }

    /* Empty grid positions are invisible but still keep grid alignment. */
    .cell.empty {
      border: none;
      background: transparent;
    }

    /* Each non-empty crossword cell contains one input box. */
    .cell input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      text-align: center;
      font-size: 23px;
      font-weight: 700;
      text-transform: uppercase;
      background: transparent;
    }

    /* Focused input cell. */
    .cell.focused {
      width: var(--cell-size-active);
      height: var(--cell-size-active);
      background: var(--focus);
      z-index: 3;
    }

    /* Answer state colouring. */
    .cell.correct { background: var(--correct); }
    .cell.wrong { background: var(--wrong); }
    .cell.focused.correct { background: var(--correct); }
    .cell.focused.wrong { background: var(--wrong); }

    /* Used when Hint button highlights the answer starting square. */
    .cell.start-highlight {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .hint-start-btn {
      margin-left: 8px;
      padding: 3px 6px;
      font-size: 12px;
      cursor: pointer;
    }

    /*
      Small grey clue number in the top-left corner of the first cell.
      The number comes from Excel cell comments / notes.
    */
    .num {
      position: absolute;
      top: 2px;
      left: 3px;
      font-size: 10px;
      line-height: 10px;
      color: #888;
      font-weight: 600;
      pointer-events: none;
    }

    .hint-section h2 {
      font-size: 17px;
      margin: 8px 0 10px;
    }

    .hint-list {
      list-style: none;
      padding: 0;
      margin: 0 0 18px;
    }

    .hint-list li {
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 6px;
      border: 1px solid transparent;
      font-size: 14px;
      line-height: 1.35;
    }

    .hint-list li:hover,
    .hint-list li.active {
      background: #f1f5f9;
      border-color: #d8dee9;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }

    /*
      Responsive design:
      - On narrow screens, stack puzzle pane above hint pane.
      - Reduce crossword cell size so mobile users can still see the puzzle.
    */
    @media (max-width: 800px) {
      :root {
        --cell-size: 34px;
        --cell-size-active: 39px;
      }

      main {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .pane {
        padding: 12px;
      }

      .cell input {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <!--
    HEADER CONTROLS
    ---------------------------------------------------------------------------
    sheetSelect:
      Lets user switch between worksheet tabs / puzzles.

    Clear Answers:
      Clears all typed letters and resets hint progress.

    Show All Answers:
      Fills every crossword square using the hidden answer key read from Excel.
  -->
  <header>
    <h1>Vocabulary Crossword</h1>
    <select id="sheetSelect" disabled></select>
    <button id="clearButton" disabled>Clear Answers</button>
    <button id="showAnswersButton" disabled>Show All Answers</button>
    <span id="status" class="status">Loading vocabulary_crossword_puzzles_20tabs.xlsx...</span>
  </header>

  <!--
    MAIN UI
    ---------------------------------------------------------------------------
    Left / top pane:
      Puzzle grid generated by buildGrid().

    Right / bottom pane:
      Clues generated by buildHints().
  -->
  <main>
    <section class="pane puzzle-pane">
      <div id="grid" class="grid"></div>
    </section>

    <aside class="pane hint-pane">
      <div class="hint-section">
        <h2>Across</h2>
        <ul id="acrossHints" class="hint-list"></ul>
      </div>
      <div class="hint-section">
        <h2>Down</h2>
        <ul id="downHints" class="hint-list"></ul>
      </div>
    </aside>
  </main>

  <script>
    /*
      ===========================================================================
      JAVASCRIPT PROGRAM OVERVIEW
      ===========================================================================

      This app reads a crossword Excel workbook and converts each worksheet into
      an interactive puzzle.

      Important assumption about the Excel workbook:
      - The crossword grid is on the left side.
      - Each answer cell contains one visible uppercase letter in Excel.
      - The starting cell has an Excel comment/note containing its clue number.
      - The clue area is on the right side and uses sections like:

          Across
          1    (n.) explanation...
          2    (v.) explanation...

          Down
          3    (adj.) explanation...

      Runtime UML-style flow:

        Browser page loaded
              |
              v
        loadDefaultExcel()
              |
              | fetch(EXCEL_FILE)
              | XLSX.read(...)
              v
        Workbook object created
              |
              v
        renderSheet(first sheet)
              |
              +-------------------------------+
              |                               |
              v                               v
        parseWorksheet(ws)              buildGrid(puzzle)
              |                               |
              v                               v
        detectEntries()                 Create HTML inputs
              |
              v
        attachClues()
              |
              v
        buildHints(puzzle)

      User interaction UML-style flow:

        User clicks clue
              |
              v
        activateEntry(entry)
              |
              v
        focusPosition(first cell)

        User types letter
              |
              v
        handleInput(event)
              |
              +--> store uppercase letter
              +--> evaluateAllEntries()
              +--> move to next cell in active word

        User presses Delete / Backspace
              |
              v
        handleKeyDown(event)
              |
              +--> clear current cell
              +--> evaluateAllEntries()
              +--> move to previous cell in active word

        User clicks Hint button
              |
              v
        revealNextHintLetter(entry)
              |
              +--> reveal letter 1, then 2, then 3, then loop back
              +--> showEntryStart(entry)
              +--> evaluateAllEntries()

        User clicks Show All Answers
              |
              v
        showAllAnswers()
              |
              +--> copy every answer from currentPuzzle.cells into inputs

      Main data structures:

      workbook:
        The full Excel workbook returned by XLSX.read().

      currentPuzzle:
        {
          cells:   { "row,col": "A" },       // answer key
          numbers: { "row,col": 1 },         // clue numbers from comments
          entries: [Entry, Entry, ...],       // Across / Down word objects
          rows: number,
          cols: number
        }

      Entry object:
        {
          id: "Across-1-0-0",
          number: 1,
          direction: "Across" or "Down",
          positions: [{ r:0, c:0 }, ...],
          answer: "ADDRESS",
          clue: "(n./v.) details of where someone lives / to speak to"
        }

      Coordinate system:
      - SheetJS uses 0-based row/column indexes.
      - Therefore internal keys such as "0,0" refer to the first row and first col.
      - XLSX.utils.encode_cell({ r, c }) converts those indexes into Excel addresses.
    */

    // Excel file to load automatically from the same directory as this HTML file.
    const EXCEL_FILE = 'vocabulary_crossword_puzzles_20tabs.xlsx';

    // DOM references for controls and output areas.
    const sheetSelect = document.getElementById('sheetSelect');
    const clearButton = document.getElementById('clearButton');
    const showAnswersButton = document.getElementById('showAnswersButton');
    const gridEl = document.getElementById('grid');
    const acrossHintsEl = document.getElementById('acrossHints');
    const downHintsEl = document.getElementById('downHints');
    const statusEl = document.getElementById('status');

    // workbook holds the parsed Excel workbook.
    let workbook = null;

    // currentPuzzle holds the parsed data for the currently selected worksheet.
    let currentPuzzle = null;

    // activeEntry is the word currently being typed.
    // It controls automatic cursor movement after each typed letter.
    let activeEntry = null;

    // Keep track of which hint letter should be revealed next for each vocabulary entry.
    // Key = entry.id, value = next letter index inside the first three letters.
    // It cycles like this: 0 -> 1 -> 2 -> 0 -> 1 -> 2...
    const hintProgress = {};

    /*
      Event wiring:
      - DOMContentLoaded starts Excel loading.
      - Changing the dropdown renders another worksheet.
      - Buttons call their corresponding control functions.
    */
    window.addEventListener('DOMContentLoaded', loadDefaultExcel);
    sheetSelect.addEventListener('change', () => renderSheet(sheetSelect.value));
    clearButton.addEventListener('click', clearAnswers);
    showAnswersButton.addEventListener('click', showAllAnswers);

    async function loadDefaultExcel() {
      /*
        Load the Excel file from the same folder.

        Important browser note:
        - fetch() usually does not work properly when opening the HTML by double
          clicking it as file://.
        - Run a local server instead, for example:
            python3 -m http.server 8000
          then open:
            http://localhost:8000/crossword.html
      */
      try {
        const response = await fetch(EXCEL_FILE);
        if (!response.ok) throw new Error(`Cannot load ${EXCEL_FILE}`);

        const data = await response.arrayBuffer();

        // cellComments:true is needed because clue numbers are stored in Excel comments.
        workbook = XLSX.read(data, { type: 'array', cellComments: true });

        // Fill the worksheet selector with all sheet names.
        sheetSelect.innerHTML = '';
        workbook.SheetNames.forEach(name => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          sheetSelect.appendChild(option);
        });

        // Enable controls after workbook has loaded successfully.
        sheetSelect.disabled = false;
        clearButton.disabled = false;
        showAnswersButton.disabled = false;

        // Render the first puzzle by default.
        renderSheet(workbook.SheetNames[0]);
      } catch (error) {
        statusEl.textContent = `Failed to load ${EXCEL_FILE}. Put the Excel file in the same folder and open this page through a local web server.`;
        console.error(error);
      }
    }

    function renderSheet(sheetName) {
      /*
        Render one worksheet as a playable puzzle.

        Steps:
        1. Get worksheet object from workbook.
        2. Parse worksheet into currentPuzzle.
        3. Build the crossword grid.
        4. Build the Across / Down clue lists.
      */
      const ws = workbook.Sheets[sheetName];
      currentPuzzle = parseWorksheet(ws);
      activeEntry = null;
      buildGrid(currentPuzzle);
      buildHints(currentPuzzle);
      statusEl.textContent = `Loaded: ${sheetName}`;
    }

    function parseWorksheet(ws) {
      /*
        Convert raw Excel worksheet into a JavaScript puzzle object.

        This function is responsible for reading:
        - answer letters from the left grid area
        - clue numbers from Excel comments
        - clue text from the right clue area

        It delegates word detection to detectEntries() and clue mapping to
        attachClues().
      */
      const range = XLSX.utils.decode_range(ws['!ref']);
      const cells = {};
      const numbers = {};

      let maxGridRow = 0;
      let maxGridCol = 0;

      // Assumption: crossword grid is in the left area; hints start after a blank gap/right side.
      // This ignores clue text columns by only reading single uppercase letter cells.
      for (let r = range.s.r; r <= range.e.r; r++) {
        for (let c = range.s.c; c <= range.e.c; c++) {
          const addr = XLSX.utils.encode_cell({ r, c });
          const cell = ws[addr];
          if (!cell || cell.v == null) continue;

          const text = String(cell.v).trim();

          // Only a single letter is treated as a crossword answer cell.
          // Clue text is longer, so it is ignored here.
          if (/^[A-Za-z]$/.test(text)) {
            const key = `${r},${c}`;
            cells[key] = text.toUpperCase();
            maxGridRow = Math.max(maxGridRow, r);
            maxGridCol = Math.max(maxGridCol, c);

            // Starting clue numbers are stored in Excel comments / notes.
            const commentNumber = extractCommentNumber(cell.c);
            if (commentNumber) numbers[key] = commentNumber;
          }
        }
      }

      const entries = detectEntries(cells, numbers);
      attachClues(ws, entries, range);

      return {
        cells,
        numbers,
        entries,
        rows: maxGridRow + 1,
        cols: maxGridCol + 1
      };
    }

    function extractCommentNumber(comments) {
      /*
        Excel comments are returned by SheetJS as an array.
        We join all comment text and extract the first number.

        Example:
        comment text = "12"
        returns 12
      */
      if (!comments || !comments.length) return null;
      const raw = comments.map(c => c.t || '').join(' ');
      const match = raw.match(/\d+/);
      return match ? Number(match[0]) : null;
    }

    function detectEntries(cells, numbers) {
      /*
        Detect Across and Down words from the answer grid.

        Crossword start rules:
        - Across starts when:
            current cell has a letter
            left cell is empty
            right cell has a letter

        - Down starts when:
            current cell has a letter
            above cell is empty
            below cell has a letter

        A starting cell can start both an Across and Down word.
      */
      const entries = [];
      const has = (r, c) => cells[`${r},${c}`];

      Object.keys(cells).forEach(key => {
        const [r, c] = key.split(',').map(Number);
        const number = numbers[key];

        const startsAcross = !has(r, c - 1) && has(r, c + 1);
        const startsDown = !has(r - 1, c) && has(r + 1, c);

        if (startsAcross) {
          const positions = [];
          let cc = c;
          while (has(r, cc)) {
            positions.push({ r, c: cc });
            cc++;
          }
          entries.push(makeEntry(number, 'Across', positions, cells));
        }

        if (startsDown) {
          const positions = [];
          let rr = r;
          while (has(rr, c)) {
            positions.push({ r: rr, c });
            rr++;
          }
          entries.push(makeEntry(number, 'Down', positions, cells));
        }
      });

      return entries.sort((a, b) => (a.number || 999) - (b.number || 999));
    }

    function makeEntry(number, direction, positions, cells) {
      /*
        Create one Entry object.

        positions tells the app where each letter belongs.
        answer is built by reading the letters from cells in that order.
      */
      return {
        id: `${direction}-${number}-${positions[0].r}-${positions[0].c}`,
        number,
        direction,
        positions,
        answer: positions.map(p => cells[`${p.r},${p.c}`]).join(''),
        clue: ''
      };
    }

    function attachClues(ws, entries, range) {
      /*
        Attach clue explanation text to each Entry.

        Excel clue layout supported:

          Across
          1    explanation text
          2    explanation text

          Down
          3    explanation text

        Logic:
        - Scan every cell in the worksheet.
        - When we see "Across", current section becomes Across.
        - When we see "Down", current section becomes Down.
        - When we see a number, parse it as a clue number.
        - If the explanation is not in the same cell, read cells to the right
          using readNearbyClueText().
      */
      const clueMap = { Across: {}, Down: {} };
      let section = null;

      for (let r = range.s.r; r <= range.e.r; r++) {
        for (let c = range.s.c; c <= range.e.c; c++) {
          const cell = ws[XLSX.utils.encode_cell({ r, c })];
          if (!cell || cell.v == null) continue;

          const text = String(cell.v).trim();
          if (!text) continue;

          if (text.toLowerCase() === 'across') {
            section = 'Across';
            continue;
          }

          if (text.toLowerCase() === 'down') {
            section = 'Down';
            continue;
          }

          const parsed = parseClueCellText(text, section);
          if (parsed) {
            let clueText = parsed.clue.trim();
            if (!clueText) clueText = readNearbyClueText(ws, r, c, range);
            clueMap[parsed.direction][parsed.number] = clueText;
          }
        }
      }

      entries.forEach(entry => {
        entry.clue = clueMap[entry.direction][entry.number] || '(missing clue)';
      });
    }

    function parseClueCellText(text, currentSection) {
      /*
        Parse a clue number cell.

        Supported formats:
        - "1" when the current section is already Across or Down
        - "1. explanation"
        - "1 Across: explanation"
        - "1 Down: explanation"

        Returns:
        {
          number: 1,
          direction: "Across",
          clue: "explanation text"
        }
        or null if the cell is not a clue marker.
      */
      const parts = text.replace(':', ' ').replace('.', ' ').trim().split(' ').filter(Boolean);
      if (!parts.length) return null;
      const number = Number(parts[0]);
      if (!Number.isInteger(number)) return null;

      if (parts.length >= 2 && (parts[1].toLowerCase() === 'across' || parts[1].toLowerCase() === 'down')) {
        return {
          number,
          direction: capitaliseDirection(parts[1]),
          clue: parts.slice(2).join(' ')
        };
      }

      if (currentSection) {
        return {
          number,
          direction: currentSection,
          clue: parts.slice(1).join(' ')
        };
      }

      return null;
    }

    function readNearbyClueText(ws, row, col, range) {
      /*
        Read clue explanation text from cells to the right.

        This is needed because the Excel generator writes:
          Column Q: clue number
          Column R: clue explanation

        The parser checks up to 4 cells to the right and returns the first cell
        that looks like clue text rather than another number or section title.
      */
      for (let offset = 1; offset <= 4; offset++) {
        const nextCol = col + offset;
        if (nextCol > range.e.c) break;
        const nextCell = ws[XLSX.utils.encode_cell({ r: row, c: nextCol })];
        if (!nextCell || nextCell.v == null) continue;
        const text = String(nextCell.v).trim();
        const lower = text.toLowerCase();
        const numberValue = Number(text.replace('.', ''));
        if (text && lower !== 'across' && lower !== 'down' && !Number.isInteger(numberValue)) {
          return text;
        }
      }
      return '';
    }

    function capitaliseDirection(value) {
      return value.toLowerCase() === 'down' ? 'Down' : 'Across';
    }

    function buildGrid(puzzle) {
      /*
        Build the visible crossword grid.

        Important:
        - The Excel letters are NOT displayed as text.
        - Instead, every answer cell becomes an empty <input>.
        - The answer key remains stored in puzzle.cells.
      */
      gridEl.innerHTML = '';
      gridEl.style.gridTemplateColumns = `repeat(${puzzle.cols}, var(--cell-size))`;

      for (let r = 0; r < puzzle.rows; r++) {
        for (let c = 0; c < puzzle.cols; c++) {
          const key = `${r},${c}`;
          const value = puzzle.cells[key];
          const cellDiv = document.createElement('div');
          cellDiv.className = value ? 'cell' : 'cell empty';
          cellDiv.dataset.key = key;

          if (value) {
            // Add small grey clue number if this is a starting cell.
            const number = puzzle.numbers[key];
            if (number) {
              const num = document.createElement('span');
              num.className = 'num';
              num.textContent = number;
              cellDiv.appendChild(num);
            }

            // Create one-letter input box.
            const input = document.createElement('input');
            input.maxLength = 1;
            input.autocomplete = 'off';
            input.dataset.key = key;
            input.addEventListener('focus', () => handleFocus(key));
            input.addEventListener('keydown', handleKeyDown);
            input.addEventListener('input', handleInput);
            cellDiv.appendChild(input);
          }

          gridEl.appendChild(cellDiv);
        }
      }
    }

    function buildHints(puzzle) {
      /*
        Build clickable Across / Down clue lists.

        Each clue row contains:
        - clue number and explanation
        - Hint button

        Clicking the clue itself activates the answer and focuses the first cell.
        Clicking Hint reveals one of the first three letters in a cycle.
      */
      acrossHintsEl.innerHTML = '';
      downHintsEl.innerHTML = '';

      puzzle.entries.forEach(entry => {
        const li = document.createElement('li');
        const clueText = document.createElement('span');
        clueText.textContent = `${entry.number}. ${entry.clue}`;
        li.appendChild(clueText);

        const startButton = document.createElement('button');
        startButton.className = 'hint-start-btn';
        startButton.type = 'button';
        startButton.textContent = 'Hint';
        startButton.title = 'Reveal up to three letters and focus the answer';
        startButton.addEventListener('click', event => {
          event.stopPropagation();

          // Each press reveals one letter from the first three letters in a loop.
          // Example: 1st click reveals letter 1, 2nd reveals letter 2,
          // 3rd reveals letter 3, 4th goes back to letter 1 again.
          revealNextHintLetter(entry);

          // Focus and highlight the starting square so the user knows where to continue.
          showEntryStart(entry);

          // Re-check whether the word is complete/correct/wrong after revealing a hint.
          evaluateAllEntries();
        });
        li.appendChild(startButton);

        li.dataset.entryId = entry.id;
        li.addEventListener('click', () => activateEntry(entry));

        if (entry.direction === 'Across') acrossHintsEl.appendChild(li);
        else downHintsEl.appendChild(li);
      });
    }

    function activateEntry(entry) {
      /*
        Make this word the active typing direction.

        Why activeEntry matters:
        - handleInput() uses activeEntry to know where the cursor should move.
        - If activeEntry is Across, typing moves horizontally.
        - If activeEntry is Down, typing moves vertically.
      */
      activeEntry = entry;
      document.querySelectorAll('.hint-list li').forEach(li => {
        li.classList.toggle('active', li.dataset.entryId === entry.id);
      });

      focusPosition(entry.positions[0]);
    }

    function handleFocus(key) {
      /*
        Called when any crossword input receives focus.

        If user manually clicks a square, we try to infer which entry they mean.
        The first entry containing that cell becomes active.
      */
      document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('focused'));
      const cell = document.querySelector(`.cell[data-key="${key}"]`);
      if (cell) cell.classList.add('focused');

      if (!activeEntry || !entryContains(activeEntry, key)) {
        const candidate = currentPuzzle.entries.find(e => entryContains(e, key));
        if (candidate) activateEntry(candidate);
      }
    }

    function handleKeyDown(event) {
      /*
        Handle correction keys.

        Requirement:
        - User uses Delete / Backspace to correct letters.
        - Current cell is cleared.
        - Cursor moves one step backward in the active word where possible.
      */
      const input = event.target;
      const key = input.dataset.key;

      if (event.key === 'Backspace' || event.key === 'Delete') {
        input.value = '';
        event.preventDefault();
        evaluateAllEntries();
        const previous = previousPositionInActiveEntry(key);
        if (previous) focusPosition(previous);
      }
    }

    function handleInput(event) {
      /*
        Handle normal letter typing.

        Requirement:
        - User enters one English letter.
        - New letter overwrites existing letter automatically.
        - Cursor moves to next square in the active word.
        - No arrow buttons are required.
      */
      const input = event.target;
      const letter = input.value.slice(-1).toUpperCase();

      if (!/^[A-Z]$/.test(letter)) {
        input.value = '';
        evaluateAllEntries();
        return;
      }

      input.value = letter;
      evaluateAllEntries();

      const next = nextPositionInActiveEntry(input.dataset.key);
      if (next) focusPosition(next);
    }

    function focusPosition(pos) {
      /* Move browser focus to a specific crossword coordinate. */
      const input = document.querySelector(`input[data-key="${pos.r},${pos.c}"]`);
      if (input) {
        input.focus();
        input.select();
      }
    }

    function entryContains(entry, key) {
      /* Return true if this Entry uses the cell represented by key. */
      return entry.positions.some(p => `${p.r},${p.c}` === key);
    }

    function nextPositionInActiveEntry(key) {
      /* Find the next square in the active answer after the current key. */
      if (!activeEntry) return null;
      const i = activeEntry.positions.findIndex(p => `${p.r},${p.c}` === key);
      return i >= 0 && i < activeEntry.positions.length - 1 ? activeEntry.positions[i + 1] : null;
    }

    function previousPositionInActiveEntry(key) {
      /* Find the previous square in the active answer before the current key. */
      if (!activeEntry) return null;
      const i = activeEntry.positions.findIndex(p => `${p.r},${p.c}` === key);
      return i > 0 ? activeEntry.positions[i - 1] : null;
    }

    function evaluateAllEntries() {
      /*
        Check every Across and Down answer and colour its cells.

        Logic:
        1. Remove all previous correct/wrong colours.
        2. For each entry:
           - collect typed letters from its positions
           - if any letter is missing, leave cells white
           - if complete and exactly matches answer, colour yellow
           - if complete but incorrect, colour red

        Note:
        - A cell can belong to both Across and Down.
        - This simple colouring pass may let the later checked entry override
          the earlier visual state. For the current workbook design this is fine,
          but it can be adjusted if you want mixed-state handling later.
      */
      document.querySelectorAll('.cell').forEach(cell => {
        cell.classList.remove('correct', 'wrong');
      });

      currentPuzzle.entries.forEach(entry => {
        const typed = entry.positions.map(pos => {
          const input = document.querySelector(`input[data-key="${pos.r},${pos.c}"]`);
          return input ? input.value.toUpperCase() : '';
        });

        const hasMissing = typed.some(ch => !ch);
        if (hasMissing) return;

        const answer = typed.join('');
        const cls = answer === entry.answer ? 'correct' : 'wrong';

        entry.positions.forEach(pos => {
          const cell = document.querySelector(`.cell[data-key="${pos.r},${pos.c}"]`);
          if (cell) cell.classList.add(cls);
        });
      });
    }

    function clearAnswers() {
      /*
        Reset the current puzzle:
        - remove all typed letters
        - remove colour states
        - remove active clue highlight
        - reset Hint cycling progress
      */
      document.querySelectorAll('.cell input').forEach(input => input.value = '');
      document.querySelectorAll('.cell').forEach(cell => {
        cell.classList.remove('correct', 'wrong', 'focused', 'start-highlight');
      });
      document.querySelectorAll('.hint-list li').forEach(li => li.classList.remove('active'));
      activeEntry = null;

      // Reset all hint counters when the user clears the puzzle.
      Object.keys(hintProgress).forEach(key => delete hintProgress[key]);
    }

    function showAllAnswers() {
      /*
        Fill every crossword square with its answer key.

        The answer key is not shown initially, but it is stored in
        currentPuzzle.cells because it was read from the Excel worksheet.
      */
      if (!currentPuzzle) return;
      Object.entries(currentPuzzle.cells).forEach(([key, letter]) => {
        const input = document.querySelector(`input[data-key="${key}"]`);
        if (input) input.value = letter;
      });
      evaluateAllEntries();
    }

    function revealNextHintLetter(entry) {
      /*
        Reveal one hint letter for this entry.

        Requirement:
        - Each click reveals one of the first three letters.
        - The sequence loops forever:
            click 1 -> letter 1
            click 2 -> letter 2
            click 3 -> letter 3
            click 4 -> letter 1 again

        Implementation:
        - hintProgress[entry.id] stores the next letter index.
        - cycleLength is 3, unless the word has fewer than 3 letters.
        - The revealed letter overwrites any user-entered letter in that square.
      */
      const currentIndex = hintProgress[entry.id] || 0;

      // Only cycle through the first three letters, or fewer if the word is short.
      const cycleLength = Math.min(3, entry.positions.length);
      const letterIndex = currentIndex % cycleLength;

      const pos = entry.positions[letterIndex];
      const key = `${pos.r},${pos.c}`;
      const input = document.querySelector(`input[data-key="${key}"]`);

      if (input) {
        // Hint letters overwrite whatever the user typed in that square.
        input.value = entry.answer.charAt(letterIndex);
      }

      // Move to the next hint letter. After the third letter, it loops back to the first.
      hintProgress[entry.id] = (letterIndex + 1) % cycleLength;
    }

    function showEntryStart(entry) {
      /*
        Focus and highlight the first square of an entry.

        Used by:
        - Hint button
        - clue click through activateEntry()
      */
      activateEntry(entry);
      document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('start-highlight'));
      const start = entry.positions[0];
      const cell = document.querySelector(`.cell[data-key="${start.r},${start.c}"]`);
      if (cell) {
        cell.classList.add('start-highlight');
        cell.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
      }
    }
  </script>
</body>
</html>
