<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocabulary Crossword Player</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --cell-size: 42px;
      --cell-size-active: 48px;
      --grid-gap: 2px;
      --border: #cfcfcf;
      --text: #222;
      --muted: #777;
      --correct: #ffe066;
      --wrong: #ff8a8a;
      --focus: #dbeafe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: #fafafa;
    }

    header {
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 20px;
      margin: 0 16px 0 0;
    }

    input[type="file"], select, button {
      font-size: 14px;
      padding: 8px 10px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(520px, 1fr) 360px;
      gap: 18px;
      padding: 20px;
      align-items: start;
    }

    .pane {
      background: white;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .puzzle-pane {
      overflow: auto;
    }

    .grid {
      display: inline-grid;
      gap: var(--grid-gap);
      background: transparent;
      padding: 4px;
    }

    .cell {
      position: relative;
      width: var(--cell-size);
      height: var(--cell-size);
      border: 1px solid var(--border);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: width 0.08s, height 0.08s, background 0.12s;
    }

    .cell.empty {
      border: none;
      background: transparent;
    }

    .cell input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      text-align: center;
      font-size: 23px;
      font-weight: 700;
      text-transform: uppercase;
      background: transparent;
    }

    .cell.focused {
      width: var(--cell-size-active);
      height: var(--cell-size-active);
      background: var(--focus);
      z-index: 3;
    }

    .cell.correct { background: var(--correct); }
    .cell.wrong { background: var(--wrong); }
    .cell.focused.correct { background: var(--correct); }
    .cell.focused.wrong { background: var(--wrong); }

    .cell.start-highlight {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
    }

    .hint-start-btn {
      margin-left: 8px;
      padding: 3px 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .num {
      position: absolute;
      top: 2px;
      left: 3px;
      font-size: 10px;
      line-height: 10px;
      color: #888;
      font-weight: 600;
      pointer-events: none;
    }

    .hint-section h2 {
      font-size: 17px;
      margin: 8px 0 10px;
    }

    .hint-list {
      list-style: none;
      padding: 0;
      margin: 0 0 18px;
    }

    .hint-list li {
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 6px;
      border: 1px solid transparent;
      font-size: 14px;
      line-height: 1.35;
    }

    .hint-list li:hover,
    .hint-list li.active {
      background: #f1f5f9;
      border-color: #d8dee9;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }

    @media (max-width: 800px) {
      :root {
        --cell-size: 34px;
        --cell-size-active: 39px;
      }

      main {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .pane {
        padding: 12px;
      }

      .cell input {
        font-size: 19px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Vocabulary Crossword</h1>
    <select id="sheetSelect" disabled></select>
    <button id="clearButton" disabled>Clear Answers</button>
    <button id="showAnswersButton" disabled>Show All Answers</button>
    <span id="status" class="status">Loading vocabulary_crossword_puzzles_20tabs.xlsx...</span>
  </header>

  <main>
    <section class="pane puzzle-pane">
      <div id="grid" class="grid"></div>
    </section>

    <aside class="pane hint-pane">
      <div class="hint-section">
        <h2>Across</h2>
        <ul id="acrossHints" class="hint-list"></ul>
      </div>
      <div class="hint-section">
        <h2>Down</h2>
        <ul id="downHints" class="hint-list"></ul>
      </div>
    </aside>
  </main>

  <script>
    const EXCEL_FILE = 'vocabulary_crossword_puzzles_20tabs.xlsx';
    const sheetSelect = document.getElementById('sheetSelect');
    const clearButton = document.getElementById('clearButton');
    const showAnswersButton = document.getElementById('showAnswersButton');
    const gridEl = document.getElementById('grid');
    const acrossHintsEl = document.getElementById('acrossHints');
    const downHintsEl = document.getElementById('downHints');
    const statusEl = document.getElementById('status');

    let workbook = null;
    let currentPuzzle = null;
    let activeEntry = null;
    // Keep track of how many hint letters have been revealed for each vocabulary entry.
    // Key = entry.id, value = number of letters already shown, maximum 3.
    const hintProgress = {};

    window.addEventListener('DOMContentLoaded', loadDefaultExcel);
    sheetSelect.addEventListener('change', () => renderSheet(sheetSelect.value));
    clearButton.addEventListener('click', clearAnswers);
    showAnswersButton.addEventListener('click', showAllAnswers);

    async function loadDefaultExcel() {
      try {
        const response = await fetch(EXCEL_FILE);
        if (!response.ok) throw new Error(`Cannot load ${EXCEL_FILE}`);

        const data = await response.arrayBuffer();
        workbook = XLSX.read(data, { type: 'array', cellComments: true });

        sheetSelect.innerHTML = '';
        workbook.SheetNames.forEach(name => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          sheetSelect.appendChild(option);
        });

        sheetSelect.disabled = false;
        clearButton.disabled = false;
        showAnswersButton.disabled = false;
        renderSheet(workbook.SheetNames[0]);
      } catch (error) {
        statusEl.textContent = `Failed to load ${EXCEL_FILE}. Put the Excel file in the same folder and open this page through a local web server.`;
        console.error(error);
      }
    }

    function renderSheet(sheetName) {
      const ws = workbook.Sheets[sheetName];
      currentPuzzle = parseWorksheet(ws);
      activeEntry = null;
      buildGrid(currentPuzzle);
      buildHints(currentPuzzle);
      statusEl.textContent = `Loaded: ${sheetName}`;
    }

    function parseWorksheet(ws) {
      const range = XLSX.utils.decode_range(ws['!ref']);
      const cells = {};
      const numbers = {};

      let maxGridRow = 0;
      let maxGridCol = 0;

      // Assumption: crossword grid is in the left area; hints start after a blank gap/right side.
      // This ignores clue text columns by only reading single uppercase letter cells.
      for (let r = range.s.r; r <= range.e.r; r++) {
        for (let c = range.s.c; c <= range.e.c; c++) {
          const addr = XLSX.utils.encode_cell({ r, c });
          const cell = ws[addr];
          if (!cell || cell.v == null) continue;

          const text = String(cell.v).trim();
          if (/^[A-Za-z]$/.test(text)) {
            const key = `${r},${c}`;
            cells[key] = text.toUpperCase();
            maxGridRow = Math.max(maxGridRow, r);
            maxGridCol = Math.max(maxGridCol, c);

            const commentNumber = extractCommentNumber(cell.c);
            if (commentNumber) numbers[key] = commentNumber;
          }
        }
      }

      const entries = detectEntries(cells, numbers);
      attachClues(ws, entries, range);

      return {
        cells,
        numbers,
        entries,
        rows: maxGridRow + 1,
        cols: maxGridCol + 1
      };
    }

    function extractCommentNumber(comments) {
      if (!comments || !comments.length) return null;
      const raw = comments.map(c => c.t || '').join(' ');
      const match = raw.match(/\d+/);
      return match ? Number(match[0]) : null;
    }

    function detectEntries(cells, numbers) {
      const entries = [];
      const has = (r, c) => cells[`${r},${c}`];

      Object.keys(cells).forEach(key => {
        const [r, c] = key.split(',').map(Number);
        const number = numbers[key];

        const startsAcross = !has(r, c - 1) && has(r, c + 1);
        const startsDown = !has(r - 1, c) && has(r + 1, c);

        if (startsAcross) {
          const positions = [];
          let cc = c;
          while (has(r, cc)) {
            positions.push({ r, c: cc });
            cc++;
          }
          entries.push(makeEntry(number, 'Across', positions, cells));
        }

        if (startsDown) {
          const positions = [];
          let rr = r;
          while (has(rr, c)) {
            positions.push({ r: rr, c });
            rr++;
          }
          entries.push(makeEntry(number, 'Down', positions, cells));
        }
      });

      return entries.sort((a, b) => (a.number || 999) - (b.number || 999));
    }

    function makeEntry(number, direction, positions, cells) {
      return {
        id: `${direction}-${number}-${positions[0].r}-${positions[0].c}`,
        number,
        direction,
        positions,
        answer: positions.map(p => cells[`${p.r},${p.c}`]).join(''),
        clue: ''
      };
    }

    function attachClues(ws, entries, range) {
      const clueMap = { Across: {}, Down: {} };
      let section = null;

      for (let r = range.s.r; r <= range.e.r; r++) {
        for (let c = range.s.c; c <= range.e.c; c++) {
          const cell = ws[XLSX.utils.encode_cell({ r, c })];
          if (!cell || cell.v == null) continue;

          const text = String(cell.v).trim();
          if (!text) continue;

          if (text.toLowerCase() === 'across') {
            section = 'Across';
            continue;
          }

          if (text.toLowerCase() === 'down') {
            section = 'Down';
            continue;
          }

          const parsed = parseClueCellText(text, section);
          if (parsed) {
            let clueText = parsed.clue.trim();
            if (!clueText) clueText = readNearbyClueText(ws, r, c, range);
            clueMap[parsed.direction][parsed.number] = clueText;
          }
        }
      }

      entries.forEach(entry => {
        entry.clue = clueMap[entry.direction][entry.number] || '(missing clue)';
      });
    }

    function parseClueCellText(text, currentSection) {
      const parts = text.replace(':', ' ').replace('.', ' ').trim().split(' ').filter(Boolean);
      if (!parts.length) return null;
      const number = Number(parts[0]);
      if (!Number.isInteger(number)) return null;

      if (parts.length >= 2 && (parts[1].toLowerCase() === 'across' || parts[1].toLowerCase() === 'down')) {
        return {
          number,
          direction: capitaliseDirection(parts[1]),
          clue: parts.slice(2).join(' ')
        };
      }

      if (currentSection) {
        return {
          number,
          direction: currentSection,
          clue: parts.slice(1).join(' ')
        };
      }

      return null;
    }

    function readNearbyClueText(ws, row, col, range) {
      for (let offset = 1; offset <= 4; offset++) {
        const nextCol = col + offset;
        if (nextCol > range.e.c) break;
        const nextCell = ws[XLSX.utils.encode_cell({ r: row, c: nextCol })];
        if (!nextCell || nextCell.v == null) continue;
        const text = String(nextCell.v).trim();
        const lower = text.toLowerCase();
        const numberValue = Number(text.replace('.', ''));
        if (text && lower !== 'across' && lower !== 'down' && !Number.isInteger(numberValue)) {
          return text;
        }
      }
      return '';
    }

    function capitaliseDirection(value) {
      return value.toLowerCase() === 'down' ? 'Down' : 'Across';
    }

    function buildGrid(puzzle) {
      gridEl.innerHTML = '';
      gridEl.style.gridTemplateColumns = `repeat(${puzzle.cols}, var(--cell-size))`;

      for (let r = 0; r < puzzle.rows; r++) {
        for (let c = 0; c < puzzle.cols; c++) {
          const key = `${r},${c}`;
          const value = puzzle.cells[key];
          const cellDiv = document.createElement('div');
          cellDiv.className = value ? 'cell' : 'cell empty';
          cellDiv.dataset.key = key;

          if (value) {
            const number = puzzle.numbers[key];
            if (number) {
              const num = document.createElement('span');
              num.className = 'num';
              num.textContent = number;
              cellDiv.appendChild(num);
            }

            const input = document.createElement('input');
            input.maxLength = 1;
            input.autocomplete = 'off';
            input.dataset.key = key;
            input.addEventListener('focus', () => handleFocus(key));
            input.addEventListener('keydown', handleKeyDown);
            input.addEventListener('input', handleInput);
            cellDiv.appendChild(input);
          }

          gridEl.appendChild(cellDiv);
        }
      }
    }

    function buildHints(puzzle) {
      acrossHintsEl.innerHTML = '';
      downHintsEl.innerHTML = '';

      puzzle.entries.forEach(entry => {
        const li = document.createElement('li');
        const clueText = document.createElement('span');
        clueText.textContent = `${entry.number}. ${entry.clue}`;
        li.appendChild(clueText);

        const startButton = document.createElement('button');
        startButton.className = 'hint-start-btn';
        startButton.type = 'button';
        startButton.textContent = 'Hint';
        startButton.title = 'Reveal up to three letters and focus the answer';
        startButton.addEventListener('click', event => {
          event.stopPropagation();

          // Each press reveals one more letter for this vocabulary.
          // Example: 1st click reveals letter 1, 2nd click reveals letter 2,
          // 3rd click reveals letter 3. Further clicks do not reveal more.
          revealNextHintLetter(entry);

          // Focus and highlight the starting square so the user knows where to continue.
          showEntryStart(entry);

          // Re-check whether the word is complete/correct/wrong after revealing a hint.
          evaluateAllEntries();
        });
        li.appendChild(startButton);

        li.dataset.entryId = entry.id;
        li.addEventListener('click', () => activateEntry(entry));

        if (entry.direction === 'Across') acrossHintsEl.appendChild(li);
        else downHintsEl.appendChild(li);
      });
    }

    function activateEntry(entry) {
      activeEntry = entry;
      document.querySelectorAll('.hint-list li').forEach(li => {
        li.classList.toggle('active', li.dataset.entryId === entry.id);
      });

      focusPosition(entry.positions[0]);
    }

    function handleFocus(key) {
      document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('focused'));
      const cell = document.querySelector(`.cell[data-key="${key}"]`);
      if (cell) cell.classList.add('focused');

      if (!activeEntry || !entryContains(activeEntry, key)) {
        const candidate = currentPuzzle.entries.find(e => entryContains(e, key));
        if (candidate) activateEntry(candidate);
      }
    }

    function handleKeyDown(event) {
      const input = event.target;
      const key = input.dataset.key;

      if (event.key === 'Backspace' || event.key === 'Delete') {
        input.value = '';
        event.preventDefault();
        evaluateAllEntries();
        const previous = previousPositionInActiveEntry(key);
        if (previous) focusPosition(previous);
      }
    }

    function handleInput(event) {
      const input = event.target;
      const letter = input.value.slice(-1).toUpperCase();

      if (!/^[A-Z]$/.test(letter)) {
        input.value = '';
        evaluateAllEntries();
        return;
      }

      input.value = letter;
      evaluateAllEntries();

      const next = nextPositionInActiveEntry(input.dataset.key);
      if (next) focusPosition(next);
    }

    function focusPosition(pos) {
      const input = document.querySelector(`input[data-key="${pos.r},${pos.c}"]`);
      if (input) {
        input.focus();
        input.select();
      }
    }

    function entryContains(entry, key) {
      return entry.positions.some(p => `${p.r},${p.c}` === key);
    }

    function nextPositionInActiveEntry(key) {
      if (!activeEntry) return null;
      const i = activeEntry.positions.findIndex(p => `${p.r},${p.c}` === key);
      return i >= 0 && i < activeEntry.positions.length - 1 ? activeEntry.positions[i + 1] : null;
    }

    function previousPositionInActiveEntry(key) {
      if (!activeEntry) return null;
      const i = activeEntry.positions.findIndex(p => `${p.r},${p.c}` === key);
      return i > 0 ? activeEntry.positions[i - 1] : null;
    }

    function evaluateAllEntries() {
      document.querySelectorAll('.cell').forEach(cell => {
        cell.classList.remove('correct', 'wrong');
      });

      currentPuzzle.entries.forEach(entry => {
        const typed = entry.positions.map(pos => {
          const input = document.querySelector(`input[data-key="${pos.r},${pos.c}"]`);
          return input ? input.value.toUpperCase() : '';
        });

        const hasMissing = typed.some(ch => !ch);
        if (hasMissing) return;

        const answer = typed.join('');
        const cls = answer === entry.answer ? 'correct' : 'wrong';

        entry.positions.forEach(pos => {
          const cell = document.querySelector(`.cell[data-key="${pos.r},${pos.c}"]`);
          if (cell) cell.classList.add(cls);
        });
      });
    }

    function clearAnswers() {
      document.querySelectorAll('.cell input').forEach(input => input.value = '');
      document.querySelectorAll('.cell').forEach(cell => {
        cell.classList.remove('correct', 'wrong', 'focused', 'start-highlight');
      });
      document.querySelectorAll('.hint-list li').forEach(li => li.classList.remove('active'));
      activeEntry = null;

      // Reset all hint counters when the user clears the puzzle.
      Object.keys(hintProgress).forEach(key => delete hintProgress[key]);
    }

    function showAllAnswers() {
      if (!currentPuzzle) return;
      Object.entries(currentPuzzle.cells).forEach(([key, letter]) => {
        const input = document.querySelector(`input[data-key="${key}"]`);
        if (input) input.value = letter;
      });
      evaluateAllEntries();
    }

    function revealNextHintLetter(entry) {
      const alreadyShown = hintProgress[entry.id] || 0;
      const nextIndex = alreadyShown;

      // Maximum three hint letters per vocabulary, and never beyond word length.
      if (nextIndex >= 3 || nextIndex >= entry.positions.length) return;

      const pos = entry.positions[nextIndex];
      const key = `${pos.r},${pos.c}`;
      const input = document.querySelector(`input[data-key="${key}"]`);

      if (input) {
        // Hint letters overwrite whatever the user typed in that square.
        input.value = entry.answer.charAt(nextIndex);
      }

      hintProgress[entry.id] = nextIndex + 1;
    }

    function showEntryStart(entry) {
      activateEntry(entry);
      document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('start-highlight'));
      const start = entry.positions[0];
      const cell = document.querySelector(`.cell[data-key="${start.r},${start.c}"]`);
      if (cell) {
        cell.classList.add('start-highlight');
        cell.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
      }
    }
  </script>
</body>
</html>
